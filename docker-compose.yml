services:
  pianini:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: pianini
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
